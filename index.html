<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hymni</title>
    <style>
        /* MANTENEMOS TU ESTILO EXACTO */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background-color: #162844;
            background-image: radial-gradient(rgba(255, 255, 255, 0.12) 1px, transparent 1px);
            background-size: 30px 30px;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #162844; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 1s ease; cursor: pointer;
        }
        .heartbeat { width: 140px; animation: beat 1.5s infinite; mix-blend-mode: screen; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        #audio-control {
            position: fixed; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; padding: 8px 12px; border-radius: 50px;
            cursor: pointer; z-index: 1000; font-family: sans-serif;
            font-size: 0.7rem; letter-spacing: 1px; display: none;
        }

        #main-content { display: none; width: 100%; max-width: 500px; padding: 40px 20px; text-align: center; }
        .logo-mini { width: 120px; margin-bottom: 5px; mix-blend-mode: screen; opacity: 0.9; }
        
        .slogan {
            font-size: 0.65rem; 
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.5;
            margin-bottom: 12px;
            line-height: 1.8;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
        }

        .subtitulo-app {
            font-weight: 300; font-style: italic; font-size: 1rem;
            margin-bottom: 30px; color: rgba(255, 255, 255, 0.9);
            letter-spacing: 1px;
        }

        .divisor { border: 0; border-top: 1px solid rgba(255,255,255,0.1); width: 60%; margin: 0 auto 30px auto; }
        .himno-item { text-align: left; padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .himno-meta { font-size: 0.7rem; opacity: 0.5; margin-bottom: 5px; }
        .himno-titulo { font-size: 1.1rem; font-weight: 400; color: #fff; }

        /* Estilos del Modal */
        #modal-himno {
            display: none; position: fixed; z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(22, 40, 68, 0.98);
            overflow-y: auto; padding: 40px 20px;
        }
        .modal-content { max-width: 500px; margin: 0 auto; text-align: left; }
        .btn-cerrar { position: fixed; top: 20px; right: 20px; background: none; border: none; color: white; font-size: 2rem; cursor: pointer; opacity: 0.5; }
        .himno-letra { white-space: pre-line; line-height: 1.8; font-size: 1.2rem; margin-top: 25px; color: rgba(255,255,255,0.95); font-family: 'Georgia', serif; }
        .letra-enfasis { font-style: italic; color: #a5b4fc; margin: 15px 0; display: block; }
    </style>
</head>
<body>

    <div id="splash" onclick="iniciarApp()">
        <img src="static/Logo_hymni.jpg" class="heartbeat">
        <h1 style="letter-spacing: 12px; font-weight: 300; margin-top: 20px;">hymni</h1>
        <p style="font-family: Arial; font-size: 0.7rem; margin-top: 30px; letter-spacing: 4px; opacity: 0.5;">TOCA PARA ENTRAR</p>
    </div>

    <button id="audio-control" onclick="toggleAudio()">PAUSAR MÚSICA</button>
    <audio id="intro" src="static/intro.mp3" loop></audio>

    <div id="main-content">
        <header>
            <img src="static/Logo_hymni.jpg" class="logo-mini">
            <h1 style="letter-spacing: 12px; font-weight: 300; margin: 0; font-size: 2.2rem; color: white;">hymni</h1>
            <p style="font-family: Arial; font-size: 0.45rem; opacity: 0.4; letter-spacing: 1px; margin-bottom: 15px;">Versión 1.0. Derechos reservados.</p>
            <div class="slogan">Sola Fide • Sola Gratia • Sola Scriptura <br> Solus Christus • Soli Deo Gloria</div>
            <h2 class="subtitulo-app">Aquí, solo himnos</h2>
            <hr class="divisor">
        </header>

        <div id="lista-himnos" class="lista">
            <p style="margin-top: 50px; opacity: 0.4; font-style: italic;">Cargando himnario...</p>
        </div>

        <div id="publicidad-listado" style="text-align: center; margin-top: 50px; padding: 30px 20px; background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.1); border-radius: 16px; margin-bottom: 50px;">
            <p style="font-size: 0.75rem; opacity: 0.4; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px;">Espacio Publicitario Disponible</p>
            <p style="font-size: 0.95rem; opacity: 0.7; margin-bottom: 10px; font-style: italic;">Tu empresa puede anunciar aquí.</p>
            <a href="mailto:sola.hymni@gmail.com" style="color: #a5b4fc; font-size: 0.9rem; text-decoration: none;">Contacto: sola.hymni@gmail.com</a>
        </div>
    </div>

    <div id="modal-himno">
        <button class="btn-cerrar" onclick="cerrarModal()">&times;</button>
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <div id="modal-meta" class="himno-meta"></div>
                <button id="audioBtnModal" onclick="toggleAudio()" style="background: none; border: 1px solid rgba(255,255,255,0.4); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; cursor: pointer;">ESCUCHAR INTRO</button>
            </div>
            <h2 id="modal-titulo" style="text-align: center;"></h2>
            <div id="modal-autoria" style="text-align: center; font-size: 0.85rem; opacity: 0.7; font-style: italic; margin-bottom: 15px;"></div>
            <hr class="divisor">
            <div id="seccion-biblica" style="display:none; text-align:center;">
                <div id="modal-biblico" style="font-size: 0.95rem; font-weight: bold; color: #a5b4fc;"></div>
            </div>
            <div id="modal-letra" class="himno-letra"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/1XJ-MzLjds3Pe_YXOqnEgQQnPwpcvIORgnz9jSlwwaj4/gviz/tq?tqx=out:csv";
        const audio = document.getElementById('intro');
        const audioBtn = document.getElementById('audio-control');
        let todosLosHimnos = [];

        // 1. CARGAR DATOS DE GOOGLE SHEETS
        function cargarDatos() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    todosLosHimnos = results.data;
                    renderizarLista();
                }
            });
        }

        // 2. RENDERIZAR LISTA FILTRADA POR FECHA
        // 2. RENDERIZAR LISTA FILTRADA POR FECHA
        function renderizarLista() {
            const listaDiv = document.getElementById('lista-himnos');
            const hoy = new Date();
            hoy.setHours(0, 0, 0, 0);

            const publicables = todosLosHimnos.filter(h => {
                // Buscamos la fecha aunque se llame Fecha o Fecha_Publicacion
                const fechaStr = h.Fecha_Publicacion || h.Fecha || h.fecha;
                if (!fechaStr) return false;
                const [dia, mes, anio] = fechaStr.split('/');
                const fechaH = new Date(anio, mes - 1, dia);
                return fechaH <= hoy;
            }).reverse();

            if (publicables.length === 0) {
                listaDiv.innerHTML = '<p style="margin-top: 50px; opacity: 0.4;">No hay himnos disponibles.</p>';
                return;
            }

            listaDiv.innerHTML = publicables.map(h => {
                // Definimos las variables capturando posibles variaciones de nombre en el Excel
                const titulo = h.Titulo_Himno || h.Titulo || h.titulo || "Sin título";
                const fecha = h.Fecha_Publicacion || h.Fecha || "";
                const fuente = h.Fuente_Himnario || h.Fuente || "";
                const numero = h.Numero_Himnario || h.Numero || "";
                const letra = (h.Letra_Himno || h.Letra || h.letra || "").replace(/`/g, "'"); // Limpieza de comillas
                const autor = h.Compositor || h.Autor || h.autor || "Anónimo";
                const anioComp = h.Anio_Composicion || h.Anio || h.año || "";
                const biblia = h.Texto_Biblico || h.Texto || h.Referencia || "";

                const metaData = `${fecha} | ${fuente} #${numero}`;

                return `
                    <div class="himno-item" onclick="abrirModal(\`${titulo}\`, \`${metaData}\`, \`${letra}\`, \`${autor}\`, \`${anioComp}\`, \`${biblia}\`)">
                        <div class="himno-meta">${metaData}</div>
                        <div class="himno-titulo">${titulo}</div>
                    </div>
                `;
            }).join('');
        }

        function iniciarApp() {
            audio.play().catch(e => console.log("Audio error:", e));
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                audioBtn.style.display = 'block';
            }, 800);
        }

        function toggleAudio() {
            if (audio.paused) { audio.play(); audioBtn.innerText = "PAUSAR MÚSICA"; }
            else { audio.pause(); audioBtn.innerText = "REPRODUCIR"; }
        }

        function abrirModal(titulo, meta, letra, compositor, anio, biblico) {
            audio.pause(); audioBtn.innerText = "REPRODUCIR";
            document.getElementById('modal-titulo').innerText = titulo;
            document.getElementById('modal-meta').innerText = meta;
            document.getElementById('modal-autoria').innerText = `${compositor} (${anio})`;
            
            const bibDiv = document.getElementById('seccion-biblica');
            if (biblico && biblico !== 'undefined') {
                document.getElementById('modal-biblico').innerText = biblico;
                bibDiv.style.display = 'block';
            } else { bibDiv.style.display = 'none'; }

            // Procesar énfasis [texto]
            let letraLimpia = letra.replace(/\[(.*?)\]/g, '<span class="letra-enfasis">$1</span>');
            document.getElementById('modal-letra').innerHTML = letraLimpia;
            
            document.getElementById('modal-himno').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function cerrarModal() {
            document.getElementById('modal-himno').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onload = cargarDatos;
    </script>
</body>
</html>
