<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>hymni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #a5b4fc;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Contenedor Principal */
        .app-container { max-width: 500px; margin: 0 auto; padding: 20px; }

        header { text-align: center; margin-bottom: 30px; padding-top: 20px; }
        header h1 { 
            font-family: 'Libre+Baskerville', serif; 
            font-size: 2.5rem; 
            letter-spacing: -1px;
            color: var(--accent);
        }
        header p { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; color: var(--text-dim); }

        /* Lista de Himnos */
        .himno-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: transform 0.2s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .himno-card:active { transform: scale(0.98); }
        .himno-card h2 { font-family: 'Libre+Baskerville', serif; font-size: 1.2rem; margin-bottom: 5px; }
        .himno-card p { font-size: 0.85rem; color: var(--text-dim); }

        /* Modal */
        #modal-himno {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 1000;
            overflow-y: auto;
            padding: 30px 20px;
        }

        .modal-content { max-width: 600px; margin: 0 auto; position: relative; }
        .close-btn { 
            position: sticky; top: 0; float: right; font-size: 1.5rem; 
            background: none; border: none; color: var(--accent); padding: 10px;
        }

        .modal-header { text-align: center; margin-bottom: 30px; }
        .modal-header h2 { font-family: 'Libre+Baskerville', serif; font-size: 1.8rem; margin-bottom: 10px; color: var(--accent); }
        .modal-meta { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; }

        /* Secciones del Modal */
        .seccion { margin-bottom: 30px; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 12px; }
        .seccion-titulo { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 15px; display: block; }
        
        #modal-biblico { font-style: italic; font-family: 'Libre+Baskerville', serif; font-size: 1.1rem; }
        #modal-letra { white-space: pre-line; font-family: 'Libre+Baskerville', serif; font-size: 1.15rem; text-align: center; line-height: 1.8; }
        .letra-enfasis { color: var(--accent); font-weight: bold; }

        /* Imágenes y Botones */
        #score-img { width: 100%; border-radius: 8px; margin-bottom: 15px; }
        .btn-action {
            display: inline-block; width: 100%; padding: 15px; margin-top: 10px;
            background: transparent; border: 1px solid var(--accent); color: var(--accent);
            text-decoration: none; text-align: center; border-radius: 8px; font-weight: 600;
            transition: all 0.3s;
        }
        .btn-action:hover { background: var(--accent); color: var(--bg-dark); }

        footer { text-align: center; padding: 40px; font-size: 0.7rem; color: var(--text-dim); opacity: 0.5; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>hymni</h1>
            <p>Sola Scriptura • Sola Fide</p>
        </header>

        <div id="lista-himnos">
            </div>

        <footer>
            &copy; 2026 HYMNI PROYECTO
        </footer>
    </div>

    <div id="modal-himno">
        <div class="modal-content">
            <button class="close-btn" onclick="cerrarModal()">✕</button>
            
            <div class="modal-header">
                <h2 id="modal-titulo"></h2>
                <div class="modal-meta" id="modal-meta"></div>
                <div id="modal-autoria" style="font-size: 0.85rem; margin-top: 5px;"></div>
            </div>

            <div class="seccion" id="seccion-biblica">
                <span class="seccion-titulo">Texto Bíblico</span>
                <div id="modal-biblico"></div>
            </div>

            <div class="seccion">
                <span class="seccion-titulo">Letra del Himno</span>
                <div id="modal-letra"></div>
            </div>

            <div class="seccion" id="modal-audio-link" style="display:none;">
                <span class="seccion-titulo">Multimedia</span>
                <a id="youtube-link" href="#" target="_blank" class="btn-action">VER EN YOUTUBE</a>
            </div>

            <div class="seccion" id="modal-score-container" style="display:none;">
                <span class="seccion-titulo">Partitura e Imprimible</span>
                <img id="score-img" src="" alt="Partitura">
                <a id="download-link" href="#" target="_blank" class="btn-action">DESCARGAR PDF PARA IMPRIMIR</a>
            </div>

            <div class="seccion" id="modal-historia-container">
                <span class="seccion-titulo">Historia Detrás del Himno</span>
                <div id="modal-historia" style="font-size: 0.95rem; color: var(--text-dim);"></div>
            </div>

            <div class="seccion" id="publi-container" style="text-align: center; background: none; border: 1px dashed rgba(255,255,255,0.1);">
                <div id="publi-contenido"></div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1XJ-MzLjds3Pe_YXOqnEgQQnPwpcvIORgnz9jSlwwaj4'; // Asegúrate de que sea el ID correcto
        const TAB_NAME = 'Hoja 1'; // El nombre de la pestaña en tu Sheet
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${TAB_NAME}`;

        async function cargarHimnos() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const filas = data.split('\n').slice(1);
                
                const himnos = filas.map(f => {
                    const c = f.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(x => x.replace(/^"|"$/g, ''));
                    return {
                        Fecha_Publicacion: c[0],
                        Titulo_Himno: c[1],
                        Fuente_Himnario: c[2],
                        Numero_Himnario: c[3],
                        Texto_Biblico: c[4],
                        Compositor: c[5],
                        Anio_Composicion: c[6],
                        ID_Imagen_Imprimible: c[7], // TU COLUMNA CLAVE
                        URL_Audio: c[8],
                        Letra_Himno: c[9],
                        Historia_Corta: c[10],
                        Banner_Anunciante: c[11]
                    };
                });

                const hoy = new Date().toISOString().split('T')[0];
                const listaContenedor = document.getElementById('lista-himnos');

                // Filtrar por fecha (Publicar solo los de hoy o anteriores)
                const publicados = himnos.filter(h => h.Fecha_Publicacion <= hoy);

                publicados.reverse().forEach(h => {
                    const card = document.createElement('div');
                    card.className = 'himno-card';
                    card.innerHTML = `
                        <h2>${h.Titulo_Himno}</h2>
                        <p>${h.Fuente_Himnario} #${h.Numero_Himnario} • ${h.Fecha_Publicacion}</p>
                    `;
                    card.onclick = () => abrirModal(h);
                    listaContenedor.appendChild(card);
                });

            } catch (error) {
                console.error("Error cargando datos:", error);
            }
        }

        function abrirModal(h) {
            // Datos básicos
            document.getElementById('modal-titulo').innerText = h.Titulo_Himno;
            document.getElementById('modal-meta').innerHTML = `${h.Fecha_Publicacion} • ${h.Fuente_Himnario} #${h.Numero_Himnario}`;
            document.getElementById('modal-autoria').innerText = `${h.Compositor || ''} ${h.Anio_Composicion ? '('+h.Anio_Composicion+')' : ''}`;

            // Biblia
            const bDiv = document.getElementById('seccion-biblica');
            if (h.Texto_Biblico && h.Texto_Biblico !== 'nan') {
                document.getElementById('modal-biblico').innerText = h.Texto_Biblico;
                bDiv.style.display = 'block';
            } else { bDiv.style.display = 'none'; }

            // Historia
            const histDiv = document.getElementById('modal-historia');
            if (h.Historia_Corta && h.Historia_Corta !== 'nan') {
                histDiv.innerText = h.Historia_Corta;
                histDiv.parentElement.style.display = 'block';
            } else { histDiv.parentElement.style.display = 'none'; }

            // Lógica Híbrida Partituras (JPG + PDF)
            const scoreCont = document.getElementById('modal-score-container');
            const imgElement = document.getElementById('score-img');
            const downLink = document.getElementById('download-link');
            let nombreBase = h.ID_Imagen_Imprimible || "";

            if (nombreBase && nombreBase !== 'nan' && nombreBase.trim() !== "") {
                nombreBase = nombreBase.trim();
                imgElement.src = `imprimibles/${nombreBase}.jpg`;
                downLink.href = `imprimibles/${nombreBase}.pdf`;
                scoreCont.style.display = 'block';
            } else {
                scoreCont.style.display = 'none';
            }

            // Letra con énfasis []
            let letraLimpia = (h.Letra_Himno || "").replace(/\[(.*?)\]/g, '<span class="letra-enfasis">$1</span>');
            document.getElementById('modal-letra').innerHTML = letraLimpia;

            // YouTube
            const ytCont = document.getElementById('modal-audio-link');
            if (h.URL_Audio && h.URL_Audio.includes('http')) {
                document.getElementById('youtube-link').href = h.URL_Audio;
                ytCont.style.display = 'block';
            } else { ytCont.style.display = 'none'; }

            // Publicidad
            const publiCont = document.getElementById('publi-contenido');
            if (h.Banner_Anunciante && h.Banner_Anunciante !== 'nan') {
                publiCont.innerHTML = `<img src="static/banners/${h.Banner_Anunciante}" style="width: 100%; border-radius: 8px;">`;
            } else {
                publiCont.innerHTML = `<p style="font-size:0.7rem; opacity:0.5;">Contacto: sola.hymni@gmail.com</p>`;
            }

            document.getElementById('modal-himno').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function cerrarModal() {
            document.getElementById('modal-himno').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onload = cargarHimnos;
    </script>
</body>
</html>
